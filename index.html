<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteiras Recomendadas · Perfil Conservador / Moderado / Agressivo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --ativo-item-bg: rgba(255,255,255,0.03);
  --footer-border: rgba(255,255,255,0.07);
  --bar-bg: #2a3142;
}
body.light {
  --bg: #f5f7fa; --bg2: #ffffff; --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #d4a017; --gold2: #b8860b;
  --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
  --card-bg: #ffffff; --card-border: rgba(0,0,0,0.08);
  --header-bg: #ffffff; --header-border: rgba(0,0,0,0.08);
  --ativo-item-bg: #f7f9fc;
  --footer-border: rgba(0,0,0,0.08);
  --bar-bg: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'DM Sans', 'Atkinson Hyperlegible', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
}

.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.header-date { font-size: 13px; color: var(--text3); }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: all 0.2s; }
.theme-toggle:hover { border-color: var(--gold); transform: scale(1.05); }

.main { max-width: 1300px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 1.6rem; margin-bottom: 0; height: 100%; transition: all 0.2s; }
.card-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.2rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title span { font-size: 14px; font-weight: 500; text-transform: none; color: var(--gold); }

.perfis-row { display: flex; gap: 12px; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
.perfil-btn { flex: 1; min-width: 130px; padding: 12px 16px; border-radius: 60px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); transition: all 0.2s; }
.perfil-btn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
.perfil-btn.ativo { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 700; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
@media (max-width: 800px) { .grid2 { grid-template-columns: 1fr; gap: 1.5rem; } }

/* Estilos para classes (carteira recomendada) */
.classe-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.classe-item:last-child { border-bottom: none; }
.dot-class { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.c0 { background: #f5c842; } .c1 { background: #3498db; } .c2 { background: #2ecc71; }
.c3 { background: #9b59b6; } .c4 { background: #e74c3c; } .c5 { background: #1abc9c; }
.c6 { background: #e67e22; } .c7 { background: #95a5a6; }
.classe-nome { flex: 1; font-size: 15px; font-weight: 500; }
.bar-wrapper { width: 100px; height: 6px; background: var(--bar-bg); border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--gold); border-radius: 10px; width: 0%; }
.classe-pct { font-size: 16px; font-weight: 700; color: var(--gold); min-width: 50px; text-align: right; font-family: monospace; }

/* --- ESTILO DOS ATIVOS (ORIGINAL, MAS COM BADGES COLORIDOS) --- */
.ativos-container { margin-top: 1rem; padding-top: 0.5rem; border-top: 1px dashed var(--border); }
.subtitle { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 0.5rem; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
.ativo-row { display: flex; align-items: center; gap: 12px; padding: 6px 8px; border-radius: 8px; background: var(--ativo-item-bg); margin-bottom: 4px; font-size: 13px; }
.ativo-nome { flex: 1; font-weight: 500; }
/* Badges coloridos por classe */
.ativo-classe {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 40px;
  letter-spacing: 0.3px;
  transition: all 0.1s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.ativo-peso { font-weight: 700; color: var(--gold); min-width: 55px; text-align: right; }

/* Cores de fundo para cada badge (contraste automático com texto escuro ou claro) */
.badge-prefixado { background: #f5c842; color: #1e1a0c; }
.badge-posfixado { background: #3498db; color: #fff; }
.badge-inflacao { background: #2ecc71; color: #0a2f1a; }
.badge-multimercado { background: #9b59b6; color: #fff; }
.badge-renda-variavel { background: #e74c3c; color: #fff; }
.badge-renda-fixa-global { background: #1abc9c; color: #0a2f2a; }
.badge-renda-variavel-global { background: #e67e22; color: #fff; }

.footer { text-align: center; font-size: 12px; color: var(--text3); padding: 2rem; border-top: 1px solid var(--footer-border); margin-top: 2.5rem; }
.badge-perfil { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo"><div class="dot">CR</div> Carteiras Recomendadas · Por Perfil</div>
  <div class="header-right"><div class="header-date" id="hDate"></div><button class="theme-toggle" id="themeToggle">🌙</button></div>
</header>

<main class="main">
  <div class="perfis-row" id="perfisRow"></div>

  <div class="grid2">
    <!-- Lado esquerdo: Carteira recomendada (classes) -->
    <div class="card">
      <div class="card-title">📊 Carteira recomendada <span id="perfilBadge" class="badge-perfil">Moderado</span></div>
      <div id="carteiraClassesContainer"></div>
    </div>

    <!-- Lado direito: Ativos recomendados (badges coloridos) -->
    <div class="card">
      <div class="card-title">📌 Ativos por classe <span>% da carteira total</span></div>
      <div id="ativosRecomendadosContainer"></div>
    </div>
  </div>
</main>
<footer class="footer">📌 Alocações baseadas em carteiras modelo (Excel original). Percentuais refletem o peso de cada ativo na carteira total.</footer>

<script>
const CARTEIRAS = {
  Conservador: {
    classes: {
      "Prefixado": 15,
      "Pós-fixado": 85,
      "Inflação": 0,
      "Multimercado": 0,
      "Renda Variável": 0,
      "Renda Fixa Global": 0,
      "Renda Variável Global": 0
    },
    ativos: [
      { nome: "CDB 2 anos / LCI e LCA #feed #pré", classe: "Prefixado", peso: 15 },
      { nome: "ARX Fuji FIC de FIF RF CP RL", classe: "Pós-fixado", peso: 15 },
      { nome: "Bradesco Ultra FIC FIRF LP CP (IQ) / SulAmérica Crédito Ativo", classe: "Pós-fixado", peso: 19 },
      { nome: "Compass Yield 30 FIF RF CP LP RL", classe: "Pós-fixado", peso: 6 },
      { nome: "LCI/LCA - até 1 ano - 92% CDI", classe: "Pós-fixado", peso: 27 },
      { nome: "Valora Vanguard FIC de FIDC RL", classe: "Pós-fixado", peso: 7 },
      { nome: "XP Liquidez FIC RF REF DI CP RL", classe: "Pós-fixado", peso: 11 }
    ]
  },
  Moderado: {
    classes: {
      "Prefixado": 13,
      "Pós-fixado": 58,
      "Inflação": 20,
      "Multimercado": 5,
      "Renda Variável": 4,
      "Renda Fixa Global": 0,
      "Renda Variável Global": 0
    },
    ativos: [
      { nome: "CDB 2 anos / LCI e LCA #feed #pré", classe: "Prefixado", peso: 13 },
      { nome: "ARX Fuji FIC de FIF RF CP RL", classe: "Pós-fixado", peso: 12 },
      { nome: "Bradesco Ultra FIC FIRF LP CP (IQ) / SulAmérica Crédito Ativo", classe: "Pós-fixado", peso: 11 },
      { nome: "Riza Statheros FIC FIM CP", classe: "Pós-fixado", peso: 6 },
      { nome: "Compass Yield 30 FIF RF CP LP RL", classe: "Pós-fixado", peso: 6 },
      { nome: "XP Liquidez FIC RF REF DI CP RL", classe: "Pós-fixado", peso: 16 },
      { nome: "Valora Vanguard FIC de FIDC RL", classe: "Pós-fixado", peso: 7 },
      { nome: "Trend Inflação Geral FIRF LP", classe: "Inflação", peso: 4 },
      { nome: "NTN-B 2035", classe: "Inflação", peso: 16 },
      { nome: "ACE Capital Advisory FIC FIM", classe: "Multimercado", peso: 2.5 },
      { nome: "Kapitalo K10 Advisory FIC FIM", classe: "Multimercado", peso: 2.5 },
      { nome: "Real Investor FIC FIA BDR Nível I", classe: "Renda Variável", peso: 2 },
      { nome: "NDIV11/NSDV11", classe: "Renda Variável", peso: 2 }
    ]
  },
  Agressivo: {
    classes: {
      "Prefixado": 15,
      "Pós-fixado": 50,
      "Inflação": 24,
      "Multimercado": 5,
      "Renda Variável": 6,
      "Renda Fixa Global": 0,
      "Renda Variável Global": 0
    },
    ativos: [
      { nome: "CDB 2 anos / LCI e LCA #feed #pré", classe: "Prefixado", peso: 15 },
      { nome: "Compass Yield 30 FIF RF CP LP RL", classe: "Pós-fixado", peso: 8 },
      { nome: "ARX Fuji FIC de FIF RF CP RL", classe: "Pós-fixado", peso: 19 },
      { nome: "Riza Statheros FIC FIM CP", classe: "Pós-fixado", peso: 6 },
      { nome: "Valora Vanguard FIC de FIDC RL", classe: "Pós-fixado", peso: 7 },
      { nome: "Bradesco Ultra FIC FIRF LP CP (IQ) / SulAmérica Crédito Ativo", classe: "Pós-fixado", peso: 10 },
      { nome: "NTN-B 2035", classe: "Inflação", peso: 24 },
      { nome: "ACE Capital Advisory FIC FIM", classe: "Multimercado", peso: 2.5 },
      { nome: "Kapitalo K10 Advisory FIC FIM", classe: "Multimercado", peso: 2.5 },
      { nome: "Real Investor FIC FIA BDR Nível I", classe: "Renda Variável", peso: 3 },
      { nome: "NDIV11/NSDV11", classe: "Renda Variável", peso: 3 }
    ]
  }
};

const CLASSES_ORDER = [
  "Prefixado",
  "Pós-fixado",
  "Inflação",
  "Multimercado",
  "Renda Variável",
  "Renda Fixa Global",
  "Renda Variável Global"
];

const CORES_CLASS = {
  "Prefixado": "c0",
  "Pós-fixado": "c1",
  "Inflação": "c2",
  "Multimercado": "c3",
  "Renda Variável": "c4",
  "Renda Fixa Global": "c5",
  "Renda Variável Global": "c6"
};

// Mapeamento das classes para os nomes das classes CSS dos badges
const badgeClassMap = {
  "Prefixado": "badge-prefixado",
  "Pós-fixado": "badge-posfixado",
  "Inflação": "badge-inflacao",
  "Multimercado": "badge-multimercado",
  "Renda Variável": "badge-renda-variavel",
  "Renda Fixa Global": "badge-renda-fixa-global",
  "Renda Variável Global": "badge-renda-variavel-global"
};

let perfilAtivo = "Moderado";

function renderCarteiraRecomendada() {
  const data = CARTEIRAS[perfilAtivo];
  if (!data) return;
  const container = document.getElementById('carteiraClassesContainer');
  let html = '';
  for (let classe of CLASSES_ORDER) {
    const peso = data.classes[classe] || 0;
    const corClasse = CORES_CLASS[classe] || "c7";
    html += `
      <div class="classe-item">
        <div class="dot-class ${corClasse}"></div>
        <span class="classe-nome">${classe}</span>
        <div class="bar-wrapper">
          <div class="bar-fill" style="width: ${peso}%;"></div>
        </div>
        <span class="classe-pct">${peso}%</span>
      </div>
    `;
  }
  html += `<div style="margin-top: 16px; text-align: right; font-size: 12px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 12px;">✓ Alocação total: 100%</div>`;
  container.innerHTML = html;
}

function renderAtivosRecomendados() {
  const data = CARTEIRAS[perfilAtivo];
  if (!data || !data.ativos || data.ativos.length === 0) {
    document.getElementById('ativosRecomendadosContainer').innerHTML = `<div class="empty-ativos">📭 Nenhum ativo detalhado para este perfil.</div>`;
    return;
  }
  
  // Agrupa ativos por classe para exibir títulos
  const ativosPorClasse = {};
  for (let ativo of data.ativos) {
    if (!ativosPorClasse[ativo.classe]) ativosPorClasse[ativo.classe] = [];
    ativosPorClasse[ativo.classe].push(ativo);
  }
  
  let html = `<div class="ativos-container">`;
  for (let classe of CLASSES_ORDER) {
    const lista = ativosPorClasse[classe];
    if (!lista || lista.length === 0) continue;
    html += `<div style="margin-top:0.75rem;"><span style="font-size:12px; font-weight:600; color:var(--gold);">${classe}</span></div>`;
    for (let ativo of lista) {
      const pesoFormatado = ativo.peso % 1 === 0 ? `${ativo.peso}%` : `${ativo.peso.toFixed(2).replace('.', ',')}%`;
      // Classe do badge dinâmica
      const badgeClasse = badgeClassMap[ativo.classe] || "badge-posfixado";
      html += `
        <div class="ativo-row">
          <span class="ativo-nome">${ativo.nome}</span>
          <span class="ativo-classe ${badgeClasse}">${ativo.classe}</span>
          <span class="ativo-peso">${pesoFormatado}</span>
        </div>
      `;
    }
  }
  html += `</div>`;
  document.getElementById('ativosRecomendadosContainer').innerHTML = html;
}

function refreshPorPerfil() {
  document.getElementById('perfilBadge').textContent = perfilAtivo;
  renderCarteiraRecomendada();
  renderAtivosRecomendados();
}

function renderPerfis() {
  const icons = { Conservador: '🛡️', Moderado: '⚖️', Agressivo: '🚀' };
  const container = document.getElementById('perfisRow');
  const perfis = Object.keys(CARTEIRAS);
  container.innerHTML = perfis.map(p => `<button class="perfil-btn ${p === perfilAtivo ? 'ativo' : ''}" data-perfil="${p}">${icons[p] || '📌'} ${p}</button>`).join('');
  document.querySelectorAll('.perfil-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.perfil === perfilAtivo) return;
      perfilAtivo = btn.dataset.perfil;
      renderPerfis();
      refreshPorPerfil();
    });
  });
}

function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  const btnTheme = document.getElementById('themeToggle');
  if (savedTheme === 'light') {
    document.body.classList.add('light');
    btnTheme.textContent = '☀️';
  } else {
    document.body.classList.remove('light');
    btnTheme.textContent = '🌙';
  }
  btnTheme.addEventListener('click', () => {
    if (document.body.classList.contains('light')) {
      document.body.classList.remove('light');
      localStorage.setItem('theme', 'dark');
      btnTheme.textContent = '🌙';
    } else {
      document.body.classList.add('light');
      localStorage.setItem('theme', 'light');
      btnTheme.textContent = '☀️';
    }
  });
}

document.getElementById('hDate').textContent = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
initTheme();
renderPerfis();
refreshPorPerfil();
</script>
</body>
</html>
