<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Carteiras Recomendadas · Perfil Conservador / Moderado / Agressivo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --ativo-item-bg: rgba(255,255,255,0.03);
  --footer-border: rgba(255,255,255,0.07);
  --bar-bg: #2a3142;
}
body.light {
  --bg: #f5f7fa; --bg2: #ffffff; --bg3: #eef2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #b8860b; --gold2: #9a6e0a;
  --text: #1a1a2e; --text2: #2d3a4e; --text3: #5a6e8a;
  --card-bg: #ffffff; --card-border: rgba(0,0,0,0.08);
  --header-bg: #ffffff; --header-border: rgba(0,0,0,0.08);
  --ativo-item-bg: #f7f9fc;
  --footer-border: rgba(0,0,0,0.08);
  --bar-bg: #dce4ec;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'DM Sans', 'Atkinson Hyperlegible', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
}

.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 1rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }
.header-right { display: flex; align-items: center; gap: 0.8rem; }
.header-date { font-size: 12px; color: var(--text3); }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: all 0.2s; }
.theme-toggle:hover { border-color: var(--gold); transform: scale(1.05); }

.main { max-width: 1300px; margin: 0 auto; padding: 1.5rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 1.4rem; margin-bottom: 0; height: 100%; transition: all 0.2s; }
.card-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

.perfis-row { display: flex; gap: 12px; margin-bottom: 1.8rem; flex-wrap: wrap; justify-content: center; }
.perfil-btn {
  flex: 1; min-width: 120px; padding: 12px 16px; border-radius: 60px; font-size: 15px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.2s;
  background: var(--bg2); border: 1px solid var(--border2); color: var(--text2);
}
.perfil-btn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
.perfil-btn.ativo {
  background: rgba(245, 200, 66, 0.15);
  border-color: rgba(245, 200, 66, 0.6);
  color: #f5c842;
  text-shadow: 0 0 2px rgba(245, 200, 66, 0.3);
  backdrop-filter: blur(1px);
  box-shadow: 0 0 6px rgba(245, 200, 66, 0.2);
}
body.light .perfil-btn.ativo {
  background: rgba(184, 134, 11, 0.2);
  border-color: #b8860b;
  color: #8b5a0b;
  text-shadow: none;
  box-shadow: 0 0 4px rgba(184,134,11,0.3);
}

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
@media (max-width: 800px) { 
  .grid2 { grid-template-columns: 1fr; gap: 1.2rem; }
  .card { padding: 1.2rem; }
  .perfil-btn { padding: 14px 12px; min-width: 100px; font-size: 14px; }
}
@media (max-width: 600px) {
  .main { padding: 1rem; }
  .card-title { font-size: 11px; }
  .classe-nome, .ativo-nome { font-size: 13px; }
  .bar-wrapper { width: 70px; }
}

.classe-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.classe-item:last-child { border-bottom: none; }
.dot-class { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.c0 { background: #f5c842; } .c1 { background: #3498db; } .c2 { background: #2ecc71; }
.c3 { background: #9b59b6; } .c4 { background: #e74c3c; } .c5 { background: #1abc9c; }
.c6 { background: #e67e22; } .c7 { background: #95a5a6; }
.classe-nome { flex: 1; font-size: 14px; font-weight: 500; }
.bar-wrapper { width: 100px; height: 6px; background: var(--bar-bg); border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--gold); border-radius: 10px; }
.classe-pct { font-size: 15px; font-weight: 700; color: var(--gold); min-width: 50px; text-align: right; font-family: monospace; }

.ativos-container { margin-top: 0.8rem; padding-top: 0.5rem; border-top: 1px dashed var(--border); }
.ativo-row { 
  display: flex; align-items: center; gap: 12px; padding: 8px 6px; border-radius: 8px; 
  background: var(--ativo-item-bg); margin-bottom: 6px; font-size: 13px;
}
.ativo-nome {
  flex: 1; font-weight: 500;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: color 0.2s, text-decoration 0.2s;
  white-space: normal;
  word-break: break-word;
}
.ativo-nome:hover {
  color: var(--gold);
  text-decoration: underline;
}
.ativo-classe {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 40px;
  letter-spacing: 0.3px;
  border-width: 1px;
  border-style: solid;
  white-space: nowrap;
}
.ativo-peso { font-weight: 700; color: var(--gold); min-width: 55px; text-align: right; font-family: monospace; }

/* Badges estilo neon - com ajustes para tema claro */
.badge-prefixado { background: rgba(245, 200, 66, 0.15); color: #f5c842; border-color: rgba(245, 200, 66, 0.5); }
.badge-posfixado { background: rgba(52, 152, 219, 0.15); color: #5dade2; border-color: rgba(52, 152, 219, 0.5); }
.badge-inflacao { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border-color: rgba(46, 204, 113, 0.5); }
.badge-multimercado { background: rgba(155, 89, 182, 0.15); color: #b981e0; border-color: rgba(155, 89, 182, 0.5); }
.badge-renda-variavel { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border-color: rgba(231, 76, 60, 0.5); }
.badge-renda-fixa-global { background: rgba(26, 188, 156, 0.15); color: #1abc9c; border-color: rgba(26, 188, 156, 0.5); }
.badge-renda-variavel-global { background: rgba(230, 126, 34, 0.15); color: #e67e22; border-color: rgba(230, 126, 34, 0.5); }
body.light .badge-prefixado { background: rgba(212, 160, 23, 0.25); color: #7a5c0e; border-color: #d4a017; }
body.light .badge-posfixado { background: rgba(41, 128, 185, 0.25); color: #1a5276; border-color: #2980b9; }
body.light .badge-inflacao { background: rgba(39, 174, 96, 0.25); color: #1e6b3e; border-color: #27ae60; }
body.light .badge-multimercado { background: rgba(142, 68, 173, 0.25); color: #6c3483; border-color: #8e44ad; }
body.light .badge-renda-variavel { background: rgba(192, 57, 43, 0.25); color: #922b21; border-color: #c0392b; }
body.light .badge-renda-fixa-global { background: rgba(22, 160, 133, 0.25); color: #0e6251; border-color: #16a085; }
body.light .badge-renda-variavel-global { background: rgba(211, 84, 0, 0.25); color: #a04000; border-color: #d35400; }

.footer { text-align: center; font-size: 11px; color: var(--text3); padding: 1.5rem; border-top: 1px solid var(--footer-border); margin-top: 2rem; }
</style>
</head>

      { nome: "XP Liquidez FIC RF REF DI CP RL", classe: "Pós-fixado", peso: 11, link: "https://maisretorno.com/fundo/xp-liquidez-fic-rf-referenciado-di-cp-rl-1" }
    ]
  },
  Moderado: {
    classes: { "Prefixado": 13, "Pós-fixado": 58, "Inflação": 20, "Multimercado": 5, "Renda Variável": 4, "Renda Fixa Global": 0, "Renda Variável Global": 0 },
    ativos: [
      { nome: "CDB 2 anos / LCI e LCA #feed #pré", classe: "Prefixado", peso: 13, link: null },
      { nome: "ARX Fuji FIC de FIF RF CP RL", classe: "Pós-fixado", peso: 12, link: "https://maisretorno.com/fundo/arx-fuji-fic-fif-rf-cp-rl" },
      { nome: "Bradesco Ultra FIC FIRF LP CP (IQ) / SulAmérica Crédito Ativo", classe: "Pós-fixado", peso: 11, multiLink: [
          { parte: "Bradesco Ultra FIC FIRF LP CP (IQ)", link: "https://maisretorno.com/fundo/bradesco-ultra-fif-cic-rf-cp-lp-rl" },
          { parte: "SulAmérica Crédito Ativo", link: "https://maisretorno.com/fundo/sul-america-credito-ativo-fif-rf-cp-lp-rl" }
        ] },
      { nome: "Riza Statheros FIC FIM CP", classe: "Pós-fixado", peso: 6, link: "https://maisretorno.com/fundo/riza-statheros-fic-fidc-rl" },
      { nome: "Compass Yield 30 FIF RF CP LP RL", classe: "Pós-fixado", peso: 6, link: "https://maisretorno.com/fundo/compass-yield-30-fif-rf" },
      { nome: "XP Liquidez FIC RF REF DI CP RL", classe: "Pós-fixado", peso: 16, link: "https://maisretorno.com/fundo/xp-liquidez-fic-rf-referenciado-di-cp-rl-1" },
      { nome: "Valora Vanguard FIC de FIDC RL", classe: "Pós-fixado", peso: 7, link: "https://maisretorno.com/fundo/valora-vanguard-fic-direitos-creditorios" },
      { nome: "Trend Inflação Geral FIRF LP", classe: "Inflação", peso: 4, link: "https://maisretorno.com/fundo/trend-inflacao-geral-fi-rf-rl" },
      { nome: "NTN-B 2035", classe: "Inflação", peso: 16, link: "https://maisretorno.com/tesouro-direto/tesouro-ipca-15-05-2035" },
      { nome: "ACE Capital Advisory FIC FIM", classe: "Multimercado", peso: 2.5, link: "https://maisretorno.com/fundo/ace-capital-advisory-fif-da-classe-fic-mult-rl" },
      { nome: "Kapitalo K10 Advisory FIC FIM", classe: "Multimercado", peso: 2.5, link: "https://maisretorno.com/fundo/kapitalo-k10-advisory-fif-cotas-fim" },
      { nome: "Real Investor FIC FIA BDR Nível I", classe: "Renda Variável", peso: 2, link: "https://maisretorno.com/fundo/real-investor-fic-fif-acoes-rl" },
      { nome: "NDIV11 / NSDV11", classe: "Renda Variável", peso: 2, multiLink: [
          { parte: "NDIV11", link: "https://maisretorno.com/etf/ndiv11" },
          { parte: "NSDV11", link: "https://maisretorno.com/etf/nsdv11" }
        ] }
    ]
  },
  Agressivo: {
    classes: { "Prefixado": 15, "Pós-fixado": 50, "Inflação": 24, "Multimercado": 5, "Renda Variável": 6, "Renda Fixa Global": 0, "Renda Variável Global": 0 },
    ativos: [
      { nome: "CDB 2 anos / LCI e LCA #feed #pré", classe: "Prefixado", peso: 15, link: null },
      { nome: "Compass Yield 30 FIF RF CP LP RL", classe: "Pós-fixado", peso: 8, link: "https://maisretorno.com/fundo/compass-yield-30-fif-rf" },
      { nome: "ARX Fuji FIC de FIF RF CP RL", classe: "Pós-fixado", peso: 19, link: "https://maisretorno.com/fundo/arx-fuji-fic-fif-rf-cp-rl" },
      { nome: "Riza Statheros FIC FIM CP", classe: "Pós-fixado", peso: 6, link: "https://maisretorno.com/fundo/riza-statheros-fic-fidc-rl" },
      { nome: "Valora Vanguard FIC de FIDC RL", classe: "Pós-fixado", peso: 7, link: "https://maisretorno.com/fundo/valora-vanguard-fic-direitos-creditorios" },
      { nome: "Bradesco Ultra FIC FIRF LP CP (IQ) / SulAmérica Crédito Ativo", classe: "Pós-fixado", peso: 10, multiLink: [
          { parte: "Bradesco Ultra FIC FIRF LP CP (IQ)", link: "https://maisretorno.com/fundo/bradesco-ultra-fif-cic-rf-cp-lp-rl" },
          { parte: "SulAmérica Crédito Ativo", link: "https://maisretorno.com/fundo/sul-america-credito-ativo-fif-rf-cp-lp-rl" }
        ] },
      { nome: "NTN-B 2035", classe: "Inflação", peso: 24, link: "https://maisretorno.com/tesouro-direto/tesouro-ipca-15-05-2035" },
      { nome: "ACE Capital Advisory FIC FIM", classe: "Multimercado", peso: 2.5, link: "https://maisretorno.com/fundo/ace-capital-advisory-fif-da-classe-fic-mult-rl" },
      { nome: "Kapitalo K10 Advisory FIC FIM", classe: "Multimercado", peso: 2.5, link: "https://maisretorno.com/fundo/kapitalo-k10-advisory-fif-cotas-fim" },
      { nome: "Real Investor FIC FIA BDR Nível I", classe: "Renda Variável", peso: 3, link: "https://maisretorno.com/fundo/real-investor-fic-fif-acoes-rl" },
      { nome: "NDIV11 / NSDV11", classe: "Renda Variável", peso: 3, multiLink: [
          { parte: "NDIV11", link: "https://maisretorno.com/etf/ndiv11" },
          { parte: "NSDV11", link: "https://maisretorno.com/etf/nsdv11" }
        ] }
    ]
  }
};

const CLASSES_ORDER = [
  "Prefixado", "Pós-fixado", "Inflação", "Multimercado", "Renda Variável", "Renda Fixa Global", "Renda Variável Global"
];
const CORES_CLASS = { "Prefixado": "c0", "Pós-fixado": "c1", "Inflação": "c2", "Multimercado": "c3", "Renda Variável": "c4", "Renda Fixa Global": "c5", "Renda Variável Global": "c6" };
const badgeClassMap = {
  "Prefixado": "badge-prefixado", "Pós-fixado": "badge-posfixado", "Inflação": "badge-inflacao",
  "Multimercado": "badge-multimercado", "Renda Variável": "badge-renda-variavel",
  "Renda Fixa Global": "badge-renda-fixa-global", "Renda Variável Global": "badge-renda-variavel-global"
};

let perfilAtivo = "Moderado";

function renderCarteiraRecomendada() {
  const data = CARTEIRAS[perfilAtivo];
  if (!data) return;
  const container = document.getElementById('carteiraClassesContainer');
  let html = '';
  for (let classe of CLASSES_ORDER) {
    const peso = data.classes[classe] || 0;
    const corClasse = CORES_CLASS[classe] || "c7";
    html += `<div class="classe-item"><div class="dot-class ${corClasse}"></div><span class="classe-nome">${classe}</span><div class="bar-wrapper"><div class="bar-fill" style="width: ${peso}%;"></div></div><span class="classe-pct">${peso}%</span></div>`;
  }
  html += `<div style="margin-top: 16px; text-align: right; font-size: 12px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 12px;">✓ Alocação total: 100%</div>`;
  container.innerHTML = html;
}

function renderAtivosRecomendados() {
  const data = CARTEIRAS[perfilAtivo];
  if (!data || !data.ativos || data.ativos.length === 0) {
    document.getElementById('ativosRecomendadosContainer').innerHTML = `<div class="empty-ativos">📭 Nenhum ativo detalhado.</div>`;
    return;
  }
  const ativosPorClasse = {};
  for (let ativo of data.ativos) {
    if (!ativosPorClasse[ativo.classe]) ativosPorClasse[ativo.classe] = [];
    ativosPorClasse[ativo.classe].push(ativo);
  }
  let html = `<div class="ativos-container">`;
  for (let classe of CLASSES_ORDER) {
    const lista = ativosPorClasse[classe];
    if (!lista || lista.length === 0) continue;
    html += `<div style="margin-top:0.8rem;"><span style="font-size:12px; font-weight:600; color:var(--gold);">${classe}</span></div>`;
    for (let ativo of lista) {
      const pesoFormatado = ativo.peso % 1 === 0 ? `${ativo.peso}%` : `${ativo.peso.toFixed(2).replace('.', ',')}%`;
      const badgeClasse = badgeClassMap[ativo.classe] || "badge-posfixado";
      
      // Caso especial com múltiplos links
      if (ativo.multiLink) {
        let nomeHtml = '';
        for (let i = 0; i < ativo.multiLink.length; i++) {
          const item = ativo.multiLink[i];
          nomeHtml += `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="ativo-nome" style="display: inline-block;">${item.parte}</a>`;
          if (i < ativo.multiLink.length - 1) nomeHtml += ` <span style="color: var(--text3);">/</span> `;
        }
        html += `
          <div class="ativo-row">
            <div style="flex:1; display: flex; gap: 6px; flex-wrap: wrap; align-items: baseline;">${nomeHtml}</div>
            <span class="ativo-classe ${badgeClasse}">${ativo.classe}</span>
            <span class="ativo-peso">${pesoFormatado}</span>
          </div>
        `;
      }
      // Caso com link único
      else if (ativo.link && ativo.link.trim() !== "") {
        html += `
          <div class="ativo-row">
            <a href="${ativo.link}" target="_blank" rel="noopener noreferrer" class="ativo-nome">${ativo.nome}</a>
            <span class="ativo-classe ${badgeClasse}">${ativo.classe}</span>
            <span class="ativo-peso">${pesoFormatado}</span>
          </div>
        `;
      }
      // Sem link
      else {
        html += `
          <div class="ativo-row">
            <span class="ativo-nome" style="cursor: default;">${ativo.nome}</span>
            <span class="ativo-classe ${badgeClasse}">${ativo.classe}</span>
            <span class="ativo-peso">${pesoFormatado}</span>
          </div>
        `;
      }
    }
  }
  html += `</div>`;
  document.getElementById('ativosRecomendadosContainer').innerHTML = html;
}

function refreshPorPerfil() {
  renderCarteiraRecomendada();
  renderAtivosRecomendados();
}

function renderPerfis() {
  const icons = { Conservador: '🛡️', Moderado: '⚖️', Agressivo: '🚀' };
  const container = document.getElementById('perfisRow');
  const perfis = Object.keys(CARTEIRAS);
  container.innerHTML = perfis.map(p => `<button class="perfil-btn ${p === perfilAtivo ? 'ativo' : ''}" data-perfil="${p}" aria-label="Selecionar perfil ${p}">${icons[p] || '📌'} ${p}</button>`).join('');
  document.querySelectorAll('.perfil-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.perfil === perfilAtivo) return;
      perfilAtivo = btn.dataset.perfil;
      renderPerfis();
      refreshPorPerfil();
    });
  });
}

function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  const btnTheme = document.getElementById('themeToggle');
  if (savedTheme === 'light') { document.body.classList.add('light'); btnTheme.textContent = '☀️'; }
  else { document.body.classList.remove('light'); btnTheme.textContent = '🌙'; }
  btnTheme.addEventListener('click', () => {
    if (document.body.classList.contains('light')) {
      document.body.classList.remove('light');
      localStorage.setItem('theme', 'dark');
      btnTheme.textContent = '🌙';
    } else {
      document.body.classList.add('light');
      localStorage.setItem('theme', 'light');
      btnTheme.textContent = '☀️';
    }
  });
}

document.getElementById('hDate').textContent = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
initTheme();
renderPerfis();
refreshPorPerfil();
</script>
